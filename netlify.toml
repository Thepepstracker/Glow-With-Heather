# Netlify configuration for glowwithheather.com
# Static site served from the repository root.

[build]
  publish = "."

# Pretty-URL routing: serve /codes, /quiz, etc. from their folder index.html.
[[redirects]]
  from = "/codes"
  to = "/codes/index.html"
  status = 200

[[redirects]]
  from = "/codes/*"
  to = "/codes/index.html"
  status = 200

[[redirects]]
  from = "/quiz/*"
  to = "/quiz/index.html"
  status = 200

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
