z/">Quiz</a><a href="/serums/">Serums</a><a href="/calculators/">Tools</a><a href="/peptides/">Dictionary</a><a href="/community/">Community</a></nav><a class="live-chip" data-live-chip href="https://www.tiktok.com/@glow_with.heather"><span class="live-dot"></span><span data-live-label>\uD83D\uDD34 Live tonight 8PM ET</span></a></div></header>\n<main class="container section">\n<p class="muted"><a href="/peptides/">Peptide Dictionary</a> / GHK-Cu</p>\n<h1>GHK-Cu</h1>\n<p class="answer-block">GHK-Cu, or copper tripeptide-1, is a naturally occurring copper-binding peptide used as a cosmetic skincare ingredient. In topical products it\u2019s associated with the appearance of firmer, smoother, more radiant-looking skin, and it\u2019s one of the most studied peptides in the beauty world.</p>\n<div class="card"><h2>What it is</h2><p>GHK-Cu is a small three-amino-acid peptide (glycine-histidine-lysine) bound to copper. It occurs naturally in the body and declines with age. In cosmetics it appears in serums and creams aimed at the look of skin firmness and tone.</p></div>\n<div class="card" style="margin-top:16px"><h2>Category & status</h2><p><strong>Beauty & Skin</strong> \u00B7 cosmetic ingredient (copper tripeptide-1). Widely used in topical cosmetic skincare.</p></div>\n<div class="card" style="margin-top:16px"><h2>What the research explores</h2><p>Published research has explored GHK-Cu\u2019s relationship to skin proteins like collagen and elastin, antioxidant behavior, and its appearance-related effects in topical formulations. As with all cosmetic ingredients, results vary by formulation and concentration.</p></div>\n<div class="card" style="margin-top:16px"><h2>How the Glow Lab community engages with it</h2><p>In the Glow Lab, GHK-Cu shows up most often as a topical face-serum ingredient \u2014 for example in Glow Protocols\u2019 face serums \u2014 used as part of a simple daily appearance-focused routine.</p></div>\n<div class="card" style="margin-top:16px"><h2>Rel
